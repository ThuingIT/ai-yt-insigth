name: "Pipeline — Daily Deep Analysis"

on:
  schedule:
    # 23:00 UTC = 06:00 ICT sáng hôm sau
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      stream:
        description: "Stream cần crawl"
        type: choice
        default: both
        options: [both, vn, global]
      skip_gemini:
        description: "Bỏ qua Gemini (debug nhanh)"
        type: boolean
        default: false

concurrency:
  group: youtube-daily
  cancel-in-progress: false

env:
  OUTPUT_DIR:     data
  DOCS_DIR:       docs
  TEMPLATE_DIR:   templates
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Crawl full — VN + Global, mode daily
  # ──────────────────────────────────────────────────────────
  crawl:
    name: "01 · Crawl Full (daily)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      run_id: ${{ steps.run_id.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - id: run_id
        run: echo "value=$(python -c 'import uuid; print(uuid.uuid4())')" >> $GITHUB_OUTPUT

      - name: Crawl YouTube — daily mode
        env:
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          OUTPUT_DIR:       ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:  ${{ steps.run_id.outputs.value }}
          ENABLE_COMMENTS:  "false"
        run: |
          python 01_crawl_youtube.py \
            --mode daily \
            --stream ${{ github.event.inputs.stream || 'both' }}

      - name: Verify outputs
        run: |
          echo "=== Daily crawl outputs ==="
          ls -lh ${{ env.OUTPUT_DIR }}/*.json
          python -c "
          import json
          for fname in ['crawl_vn.json', 'crawl_global.json']:
              try:
                  d = json.load(open('${{ env.OUTPUT_DIR }}/' + fname))
                  print(f\"{fname}: {len(d['videos'])} videos | mode={d.get('mode')}\")
              except FileNotFoundError:
                  print(f\"{fname}: NOT FOUND (may be skipped by --stream)\")
          "

      - uses: actions/upload-artifact@v4
        with:
          name: daily-crawl-${{ steps.run_id.outputs.value }}
          path: ${{ env.OUTPUT_DIR }}/crawl_*.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 2: Load — upsert đầy đủ + refresh materialized views
  # ──────────────────────────────────────────────────────────
  load:
    name: "02 · Load Supabase"
    runs-on: ubuntu-latest
    needs: crawl
    timeout-minutes: 15
    outputs:
      # Truyền lại run_id để các job sau không cần depends on crawl trực tiếp
      run_id: ${{ needs.crawl.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - uses: actions/download-artifact@v4
        with:
          pattern: daily-crawl-${{ needs.crawl.outputs.run_id }}
          merge-multiple: true
          path: ${{ env.OUTPUT_DIR }}

      - name: Load Supabase (daily — full upsert)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:      ${{ needs.crawl.outputs.run_id }}
        run: python 02_load_supabase.py

      - uses: actions/upload-artifact@v4
        with:
          name: daily-load-summary-${{ needs.crawl.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/load_summary.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 3: Analyze — Tầng 1 stats + Tầng 2 Gemini
  # ──────────────────────────────────────────────────────────
  analyze:
    name: "03 · Analyze + Gemini"
    runs-on: ubuntu-latest
    needs: load   # load đã export run_id → không cần depends crawl trực tiếp
    timeout-minutes: 20
    outputs:
      run_id: ${{ needs.load.outputs.run_id }}
    if: ${{ github.event.inputs.skip_gemini != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - uses: actions/download-artifact@v4
        with:
          name: daily-load-summary-${{ needs.load.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Run analysis (Tier1 + Tier2 Gemini)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:      ${{ needs.load.outputs.run_id }}
        run: python 03_analyze_gemini.py

      - uses: actions/upload-artifact@v4
        with:
          name: daily-analysis-${{ needs.load.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/analysis_output.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────
  # JOB 4: Publish — generate HTML + deploy GitHub Pages
  # ──────────────────────────────────────────────────────────
  publish:
    name: "04 · Publish Dashboard"
    runs-on: ubuntu-latest
    needs: analyze  # analyze đã export run_id → không cần depends crawl/load
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          mkdir -p ${{ env.DOCS_DIR }}

      - uses: actions/download-artifact@v4
        with:
          name: daily-analysis-${{ needs.analyze.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Generate HTML dashboard
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          DOCS_DIR:             ${{ env.DOCS_DIR }}
          TEMPLATE_DIR:         ${{ env.TEMPLATE_DIR }}
        run: python 04_generate_html.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:    ${{ secrets.GITHUB_TOKEN }}
          publish_dir:     ${{ env.DOCS_DIR }}
          publish_branch:  gh-pages
          commit_message:  "chore: daily dashboard $(date -u +'%Y-%m-%d') [skip ci]"
          user_name:       "github-actions[bot]"
          user_email:      "github-actions[bot]@users.noreply.github.com"

  # ──────────────────────────────────────────────────────────
  # JOB 5: Summary
  # ──────────────────────────────────────────────────────────
  notify:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [crawl, load, analyze, publish]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Daily Pipeline — $(date -u +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 01 Crawl      | ${{ needs.crawl.result   == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 02 Load       | ${{ needs.load.result    == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 03 Gemini     | ${{ needs.analyze.result == 'success' && '✅' || needs.analyze.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 04 Publish    | ${{ needs.publish.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
