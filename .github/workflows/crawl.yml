name: Daily YouTube Data Pipeline

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày (khoảng 7h sáng giờ VN)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Cho phép bấm nút chạy thủ công

jobs:
  run-all-steps:
    runs-on: ubuntu-latest
    
    # Khai báo biến môi trường dùng chung cho toàn bộ các bước trong Job này
    env:
      OUTPUT_DIR: data
      # Sử dụng ID của chính lần chạy GitHub Actions này làm ID chung cho cả 3 script
      PIPELINE_RUN_ID: ${{ github.run_id }}
      
      # Gọi các Secret Keys đã lưu trên GitHub
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Bước 1: Crawl dữ liệu từ YouTube. Kết quả sinh ra data/crawl_vn.json và data/crawl_global.json
      - name: Run Step 01 - Crawl YouTube
        run: python 01_crawl_youtube.py

      # Bước 2: Đẩy dữ liệu lên Supabase. Kết quả sinh ra data/load_summary.json
      - name: Run Step 02 - Load to Supabase
        run: python 02_load_supabase.py

      # Bước 3: Phân tích bằng Gemini, đọc file summary từ bước 2
      - name: Run Step 03 - Analyze with Gemini
        run: python 03_analyze_gemini.py
