name: Data Pipeline (Load & Analyze)

on:
  schedule:
    # Chạy vào 00:00 UTC mỗi ngày
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Cho phép bấm nút chạy thủ công trên giao diện GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Bạn có thể đổi sang 3.11 hoặc phiên bản bạn đang dùng
          cache: 'pip'           # Giúp tải thư viện nhanh hơn ở các lần chạy sau

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # LƯU Ý: Nếu pipeline của bạn có bước 01 để crawl data sinh ra file JSON,
      # bạn cần thêm step chạy file 01_crawl.py ở ngay đây.
      # Dưới đây là phần giả định bạn đã có cách đưa dữ liệu vào thư mục "data/".

      - name: Run Step 02 - Load Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR: data
        run: |
          # Đảm bảo thư mục tồn tại để không bị lỗi file path
          mkdir -p data 
          python 02_load_supabase.py

      - name: Run Step 03 - Analyze with Gemini
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR: data
        run: |
          python 03_analyze_gemini.py
