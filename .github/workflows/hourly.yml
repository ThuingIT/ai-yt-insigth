name: "Pipeline — Hourly Snapshot"

on:
  schedule:
    # Chạy đầu mỗi giờ (UTC) — 06:05, 07:05, ... ICT = UTC+7
    # Thêm 5 phút offset để tránh đụng với daily workflow lúc 23:00 UTC
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "In log chi tiết"
        type: boolean
        default: false

# Chỉ 1 instance chạy cùng lúc — tránh race condition vào Supabase
concurrency:
  group: youtube-hourly
  cancel-in-progress: false   # Không cancel — chờ xong rồi mới chạy cái mới

env:
  OUTPUT_DIR:      data
  DOCS_DIR:        docs
  TEMPLATE_DIR:    templates
  PYTHON_VERSION:  "3.11"

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Crawl — chỉ VN, mode hourly
  # ──────────────────────────────────────────────────────────
  crawl:
    name: "01 · Crawl VN (hourly)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      run_id: ${{ steps.run_id.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - id: run_id
        run: echo "value=$(python -c 'import uuid; print(uuid.uuid4())')" >> $GITHUB_OUTPUT

      - name: Crawl YouTube VN (hourly mode)
        env:
          YOUTUBE_API_KEY:  ${{ secrets.YOUTUBE_API_KEY }}
          OUTPUT_DIR:       ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:  ${{ steps.run_id.outputs.value }}
          ENABLE_COMMENTS:  "false"
        run: python 01_crawl_youtube.py --mode hourly

      - name: Verify output
        run: |
          test -f ${{ env.OUTPUT_DIR }}/crawl_vn.json || (echo "ERROR: crawl_vn.json missing" && exit 1)
          python -c "
          import json
          d = json.load(open('${{ env.OUTPUT_DIR }}/crawl_vn.json'))
          print(f\"Videos: {len(d['videos'])} | Mode: {d.get('mode')} | Quota: {d['quota_used']}\")
          assert d.get('mode') == 'hourly', 'mode field missing or wrong'
          "

      - uses: actions/upload-artifact@v4
        with:
          name: hourly-crawl-${{ steps.run_id.outputs.value }}
          path: ${{ env.OUTPUT_DIR }}/crawl_vn.json
          retention-days: 2    # Hourly artifacts không cần giữ lâu

  # ──────────────────────────────────────────────────────────
  # JOB 2: Load — upsert videos + hourly_snapshot + momentum
  # ──────────────────────────────────────────────────────────
  load:
    name: "02 · Load + Hourly Snapshot"
    runs-on: ubuntu-latest
    needs: crawl
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdir -p ${{ env.OUTPUT_DIR }}

      - uses: actions/download-artifact@v4
        with:
          name: hourly-crawl-${{ needs.crawl.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Load Supabase (hourly snapshot + momentum)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:      ${{ needs.crawl.outputs.run_id }}
        run: python 02_load_supabase.py

      - uses: actions/upload-artifact@v4
        with:
          name: hourly-load-summary-${{ needs.crawl.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}/load_summary.json
          retention-days: 2

  # ──────────────────────────────────────────────────────────
  # JOB 3: Generate HTML — cập nhật dashboard với data mới nhất
  # Không chạy Gemini — chỉ render lại HTML từ Supabase
  # ──────────────────────────────────────────────────────────
  publish:
    name: "04 · Refresh Dashboard"
    runs-on: ubuntu-latest
    needs: load
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          mkdir -p ${{ env.DOCS_DIR }}

      - uses: actions/download-artifact@v4
        with:
          name: hourly-load-summary-${{ needs.crawl.outputs.run_id }}
          path: ${{ env.OUTPUT_DIR }}

      # Tạo analysis_output.json giả để 04_generate_html không bị lỗi
      # Gemini insights vẫn được load từ Supabase insights table (data cũ của daily run)
      - name: Create placeholder analysis_output.json
        run: |
          python -c "
          import json, os
          path = os.path.join('${{ env.OUTPUT_DIR }}', 'analysis_output.json')
          if not os.path.exists(path):
              json.dump({'run_id': '${{ needs.crawl.outputs.run_id }}',
                         'tier1': {}, 'tier2': {}, 'date': '$(date -u +%Y-%m-%d)'},
                        open(path, 'w'))
              print('Created placeholder analysis_output.json')
          else:
              print('analysis_output.json already exists')
          "

      - name: Refresh HTML dashboard
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          DOCS_DIR:             ${{ env.DOCS_DIR }}
          TEMPLATE_DIR:         ${{ env.TEMPLATE_DIR }}
        run: python 04_generate_html.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token:   ${{ secrets.GITHUB_TOKEN }}
          publish_dir:    ${{ env.DOCS_DIR }}
          publish_branch: gh-pages
          commit_message: "chore: hourly refresh $(date -u +'%H:%M UTC') [skip ci]"
          user_name:      "github-actions[bot]"
          user_email:     "github-actions[bot]@users.noreply.github.com"

  # ──────────────────────────────────────────────────────────
  # JOB 4: Summary (luôn chạy)
  # ──────────────────────────────────────────────────────────
  notify:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [crawl, load, publish]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Hourly Pipeline — $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Crawl VN  | ${{ needs.crawl.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Load      | ${{ needs.load.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish   | ${{ needs.publish.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
