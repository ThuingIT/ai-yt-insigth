name: Youtube crawl

on:
  schedule:
    - cron: '0 1 * * *'  # 8am Vietnam (UTC+7)
  workflow_dispatch:       # Cho phép chạy tay trên GitHub

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 01_crawl_youtube.py
        env:
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
        run: 01_crawl_youtube.py
