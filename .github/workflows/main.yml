name: YouTube Analytics Pipeline

on:
  # Chạy tự động mỗi ngày lúc 06:00 ICT (23:00 UTC hôm trước)
  schedule:
    - cron: "0 23 * * *"

  # Cho phép chạy thủ công từ GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      stream:
        description: "Stream cần chạy"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - vn
          - global
      skip_analyze:
        description: "Bỏ qua bước 03 Gemini (debug nhanh)"
        required: false
        default: false
        type: boolean

# Chỉ cho 1 workflow chạy cùng lúc — tránh race condition vào Supabase
concurrency:
  group: youtube-pipeline
  cancel-in-progress: false

env:
  OUTPUT_DIR: data
  DOCS_DIR: docs
  TEMPLATE_DIR: templates
  PYTHON_VERSION: "3.11"

# ============================================================
# JOB 1: CRAWL
# Khai thác dữ liệu từ YouTube API
# Output artifact: data/crawl_vn.json, data/crawl_global.json
# ============================================================
jobs:
  crawl:
    name: "01 · Crawl YouTube API"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Generate PIPELINE_RUN_ID
        id: run_id
        # Run ID chung cho cả pipeline — dùng để trace log
        run: echo "value=$(python -c 'import uuid; print(uuid.uuid4())')" >> $GITHUB_OUTPUT

      - name: Run 01_crawl_youtube.py
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          OUTPUT_DIR:         ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:    ${{ steps.run_id.outputs.value }}
          ENABLE_COMMENTS:    "false"
          # Nếu chạy thủ công với stream cụ thể, truyền vào đây
          CRAWL_STREAM:       ${{ github.event.inputs.stream || 'both' }}
        run: |
          python 01_crawl_youtube.py --stream $CRAWL_STREAM

      - name: Verify output files
        run: |
          echo "=== Crawl output files ==="
          ls -lh ${{ env.OUTPUT_DIR }}/*.json 2>/dev/null || echo "WARNING: No JSON files found"
          # Fail nếu không có file nào
          test -f ${{ env.OUTPUT_DIR }}/crawl_vn.json || test -f ${{ env.OUTPUT_DIR }}/crawl_global.json

      - name: Upload crawl artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawl-data-${{ steps.run_id.outputs.value }}
          path: ${{ env.OUTPUT_DIR }}/crawl_*.json
          retention-days: 7

      # Lưu run_id để các job sau dùng
      - name: Save run_id
        run: echo "${{ steps.run_id.outputs.value }}" > ${{ env.OUTPUT_DIR }}/run_id.txt

      - name: Upload run_id
        uses: actions/upload-artifact@v4
        with:
          name: run-id-${{ steps.run_id.outputs.value }}
          path: ${{ env.OUTPUT_DIR }}/run_id.txt
          retention-days: 1


  # ============================================================
  # JOB 2: LOAD SUPABASE
  # Upsert vào Supabase + tính daily_delta + refresh views
  # ============================================================
  load:
    name: "02 · Load Supabase"
    runs-on: ubuntu-latest
    needs: crawl          # Chỉ chạy khi Job 1 thành công
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download crawl artifacts
        uses: actions/download-artifact@v4
        with:
          # Pattern download tất cả artifacts crawl-data-*
          pattern: crawl-data-*
          merge-multiple: true
          path: ${{ env.OUTPUT_DIR }}

      - name: Download run_id
        uses: actions/download-artifact@v4
        with:
          pattern: run-id-*
          merge-multiple: true
          path: ${{ env.OUTPUT_DIR }}

      - name: Verify downloaded files
        run: |
          echo "=== Files downloaded ==="
          ls -lh ${{ env.OUTPUT_DIR }}/

      - name: Run 02_load_supabase.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:      ${{ needs.crawl.outputs.run_id || '' }}
        run: python 02_load_supabase.py

      - name: Upload load summary
        uses: actions/upload-artifact@v4
        with:
          name: load-summary
          path: ${{ env.OUTPUT_DIR }}/load_summary.json
          retention-days: 7


  # ============================================================
  # JOB 3: ANALYZE (Tầng 1 + Tầng 2 Gemini)
  # ============================================================
  analyze:
    name: "03 · Analyze — Stats + Gemini"
    runs-on: ubuntu-latest
    needs: load
    timeout-minutes: 20
    # Cho phép skip bước này khi debug (workflow_dispatch)
    if: ${{ github.event.inputs.skip_analyze != 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Download load summary
        uses: actions/download-artifact@v4
        with:
          name: load-summary
          path: ${{ env.OUTPUT_DIR }}

      - name: Run 03_analyze_gemini.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          PIPELINE_RUN_ID:      ${{ needs.crawl.outputs.run_id || '' }}
        run: python 03_analyze_gemini.py

      - name: Upload analysis output
        uses: actions/upload-artifact@v4
        with:
          name: analysis-output
          path: ${{ env.OUTPUT_DIR }}/analysis_output.json
          retention-days: 7


  # ============================================================
  # JOB 4: GENERATE HTML + DEPLOY GITHUB PAGES
  # ============================================================
  publish:
    name: "04 · Generate HTML + Deploy Pages"
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 15

    # Cần quyền write để deploy GitHub Pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          mkdir -p ${{ env.DOCS_DIR }}

      - name: Download analysis output
        uses: actions/download-artifact@v4
        with:
          name: analysis-output
          path: ${{ env.OUTPUT_DIR }}

      - name: Run 04_generate_html.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OUTPUT_DIR:           ${{ env.OUTPUT_DIR }}
          DOCS_DIR:             ${{ env.DOCS_DIR }}
          TEMPLATE_DIR:         ${{ env.TEMPLATE_DIR }}
        run: python 04_generate_html.py

      - name: Verify HTML output
        run: |
          echo "=== Generated HTML ==="
          ls -lh ${{ env.DOCS_DIR }}/
          head -5 ${{ env.DOCS_DIR }}/index.html

      # Deploy vào branch gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.DOCS_DIR }}
          publish_branch: gh-pages
          commit_message: |
            chore: update dashboard ${{ env.TODAY }} [skip ci]
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"


  # ============================================================
  # JOB 5: NOTIFY (chạy sau tất cả — kể cả khi fail)
  # Gửi summary vào GitHub Job Summary để dễ theo dõi
  # ============================================================
  notify:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [crawl, load, analyze, publish]
    if: always()    # Luôn chạy để log kết quả

    steps:
      - name: Write job summary
        run: |
          echo "## YouTube Analytics Pipeline — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 01 Crawl YouTube  | ${{ needs.crawl.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 02 Load Supabase  | ${{ needs.load.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 03 Analyze Gemini | ${{ needs.analyze.result == 'success' && '✅ Success' || needs.analyze.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 04 Publish HTML   | ${{ needs.publish.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Dashboard:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
